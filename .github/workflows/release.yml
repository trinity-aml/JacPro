name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build And Upload Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          release_tag="${{ github.event.release.tag_name || inputs.tag }}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "release_tag=$release_tag"
            echo "image=$image"
            echo "short_sha=$short_sha"
            echo "build_date=$build_date"
          } >> "$GITHUB_OUTPUT"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build distribution binaries
        env:
          VERSION: ${{ steps.meta.outputs.release_tag }}
          COMMIT: ${{ steps.meta.outputs.short_sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        run: ./scripts/build-dist.sh

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.release_tag }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VERSION=${{ steps.meta.outputs.release_tag }}
            COMMIT=${{ steps.meta.outputs.short_sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" Dist/* --clobber
